<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration - Smart College Complaint Portal</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-page-wrapper">
    <div class="auth-card" style="max-width: 520px;">
      <a href="index.html" class="back-home-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>Back to Home</span>
      </a>

      <div class="auth-header">
        <div class="auth-logo">C</div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Register for Smart College Complaint Portal</p>
      </div>

      <!-- Registration Form -->
      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Full Name <span class="required">*</span></label>
          <input type="text" id="reg-name" class="form-control" placeholder="e.g. Rahul Sharma" required />
        </div>

        <div class="grid-2" style="gap: 12px; margin-bottom: 0;">
          <div class="form-group">
            <label class="form-label">Email Address <span class="required">*</span></label>
            <input type="email" id="reg-email" class="form-control" placeholder="rahul@college.edu" required />
          </div>

          <div class="form-group">
            <label class="form-label">Phone Number <span class="required">*</span></label>
            <input type="tel" id="reg-phone" class="form-control" placeholder="9876543210" required />
          </div>
        </div>

        <div class="grid-2" style="gap: 12px; margin-bottom: 0;">
          <div class="form-group">
            <label class="form-label">Department <span class="required">*</span></label>
            <select id="reg-department" class="form-select" required>
              <option value="Master of Computer Applications (MCA)" selected>MCA</option>
              <option value="MBA">MBA</option>
              <option value="B.Tech Computer Science">B.Tech CSE</option>
              <option value="B.Tech Electronics (ECE)">B.Tech ECE</option>
              <option value="B.Tech Mechanical">B.Tech Mechanical</option>
              <option value="Civil Engineering">Civil Engineering</option>
              <option value="Science & Humanities">Science & Humanities</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Semester <span class="required">*</span></label>
            <select id="reg-semester" class="form-select" required>
              <option value="Semester 1">Semester 1</option>
              <option value="Semester 2">Semester 2</option>
              <option value="Semester 3" selected>Semester 3</option>
              <option value="Semester 4">Semester 4</option>
              <option value="Semester 5">Semester 5</option>
              <option value="Semester 6">Semester 6</option>
              <option value="Semester 7">Semester 7</option>
              <option value="Semester 8">Semester 8</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Account Role <span class="required">*</span></label>
          <select id="reg-role" class="form-select">
            <option value="student" selected>Student</option>
            <option value="admin">Administrator (College Admin)</option>
          </select>
          <span class="form-hint">Choose 'Administrator' if you are staff/faculty with official college admin code.</span>
        </div>

        <div class="form-group" id="admin-code-group" style="display: none;">
          <label class="form-label">College Admin Security Code <span class="required">*</span></label>
          <input type="text" id="reg-admin-code" class="form-control" placeholder="Enter official college admin code" />
          <span class="form-hint">Official Security Verification Code provided by college administration.</span>
        </div>

        <div class="grid-2" style="gap: 12px; margin-bottom: 0;">
          <div class="form-group">
            <label class="form-label">Password <span class="required">*</span></label>
            <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters" required />
          </div>

          <div class="form-group">
            <label class="form-label">Confirm Password <span class="required">*</span></label>
            <input type="password" id="reg-confirm-password" class="form-control" placeholder="Re-enter password" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 12px;">
          Register Account
        </button>

        <div style="display: flex; align-items: center; margin: 18px 0; color: var(--text-secondary); font-size: 13px;">
          <div style="flex: 1; height: 1px; background: var(--border-color, #e2e8f0);"></div>
          <span style="padding: 0 12px; font-weight: 500;">OR</span>
          <div style="flex: 1; height: 1px; background: var(--border-color, #e2e8f0);"></div>
        </div>

        <button type="button" id="google-signin-btn" class="btn btn-outline" style="width: 100%; padding: 10px 16px; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid var(--border-color, #cbd5e1); background: #ffffff; color: #1e293b; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.2s;">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
          </svg>
          <span>Continue with Google</span>
        </button>
      </form>

      <div style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary);">
        Already have an account? <a href="/login.html" style="font-weight: 600;">Sign In Here</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initRegisterPage, initAuthCheck } from "./js/auth.js";
    initAuthCheck();
    initRegisterPage();
  </script>
</body>
</html>
