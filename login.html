<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Smart College Complaint Portal</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-page-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">C</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to Smart College Complaint Portal</p>
      </div>

      <!-- Role Selector Tabs -->
      <div class="auth-role-tabs">
        <div class="auth-role-tab active" data-role="student">Student Login</div>
        <div class="auth-role-tab" data-role="admin">Admin Login</div>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email Address <span class="required">*</span></label>
          <input type="email" id="login-email" class="form-control" placeholder="e.g. student@college.edu" required />
        </div>

        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <label class="form-label" style="margin-bottom: 0;">Password <span class="required">*</span></label>
            <a href="#" id="forgot-password-link" style="font-size: 12px; font-weight: 500;">Forgot Password?</a>
          </div>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 8px;">
          Sign In
        </button>
      </form>

      <div style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-secondary);">
        Don't have a student account? <a href="/register.html" style="font-weight: 600;">Register Here</a>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-backdrop" id="forgot-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 class="modal-title">Reset Password</h3>
        <button class="modal-close" id="close-forgot-modal">&times;</button>
      </div>
      <form id="forgot-form">
        <div class="modal-body">
          <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">
            Enter your registered college email address and we will send you a password reset link via Firebase.
          </p>
          <div class="form-group">
            <label class="form-label">Email Address <span class="required">*</span></label>
            <input type="email" id="reset-email" class="form-control" placeholder="student@college.edu" required />
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary btn-sm">Send Reset Email</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initLoginPage, initAuthCheck } from "./js/auth.js";
    initAuthCheck();
    initLoginPage();
  </script>
</body>
</html>
